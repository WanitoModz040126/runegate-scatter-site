<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In · RuneGate</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-mark">
          <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="none" stroke="#e8b84b" stroke-width="2"/>
            <polygon points="20,10 29,15 29,25 20,30 11,25 11,15" fill="none" stroke="#3ee6d8" stroke-width="1.5"/>
            <circle cx="20" cy="20" r="3" fill="#e8b84b"/>
          </svg>
        </div>
        <h1>RuneGate</h1>
        <p>Enter the Arena</p>
      </div>

      <div id="formError" class="form-error"></div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Log In</button>
      </form>

      <div class="auth-switch">
        No account yet? <a href="/signup.html">Create one</a>
      </div>

      <div class="disclaimer">
        RuneGate uses virtual credits only, assigned manually by an administrator.
        No real currency is ever deposited, wagered, or withdrawn. Entertainment purposes only.
      </div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
